<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jacked Platypus Events Hub – Contact</title>
  <link rel="stylesheet" href="styles/project.css">
</head>
<body>
  <header>
    <div data-include="components/header.html"></div>
  </header>

  <main>
    <section class="section">
      <h1>Contact & Booking</h1>
      <p>Use the form below to inquire about bookings, collaborations, or event details.</p>

      <form id="contact-form" class="contact-form">
        <label>
          Name
          <input id="name" type="text" name="name" required>
        </label>

        <label>
          Email
          <input id="email" type="email" name="email" required>
        </label>

        <label>
          Event Type
          <input type="text" name="eventType" placeholder="House party, bar night, formal, etc.">
        </label>

        <label>
          Event Date
          <input type="date" name="eventDate">
        </label>

        <label>
          Message
          <textarea id="message" name="message" rows="5" required></textarea>
        </label>

        <div class="form-buttons">
          <button type="submit">Send Request</button>
          <button type="reset">Reset</button>
        </div>
      </form>

      <p id="form-message" class="form-message"></p>

    </section>
  </main>

  <footer>
    <div data-include="components/footer.html"></div>
  </footer>

  <script src="../scripts/HTMLInclude.min.js"></script>
  <script src="scripts/contact.js"></script>
</body>
</html>
